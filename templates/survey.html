<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Survey Chat Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f13;
            color: #e4e4f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 24px;
            border-bottom: 1px solid #27272a;
            background: #18181b;
        }

        .back-link {
            color: #71717a;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
            white-space: nowrap;
        }

        .back-link:hover {
            color: #fff;
        }

        .topbar-title {
            font-weight: 600;
            font-size: 1rem;
        }

        .topbar-sub {
            font-size: 0.8rem;
            color: #71717a;
            margin-top: 2px;
        }

        /* Setup panel */
        #setup {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            padding: 24px;
        }

        .setup-card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 480px;
        }

        .setup-card h2 {
            font-size: 1.3rem;
            margin-bottom: 8px;
        }

        .setup-card p {
            color: #71717a;
            font-size: 0.9rem;
            margin-bottom: 28px;
        }

        .setup-card textarea {
            width: 100%;
            background: #09090b;
            border: 1px solid #27272a;
            border-radius: 8px;
            padding: 12px 14px;
            color: #e4e4f0;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            resize: vertical;
            min-height: 90px;
            transition: border-color 0.2s;
        }

        .setup-card textarea:focus {
            outline: none;
            border-color: #7c3aed;
        }

        .btn-start {
            width: 100%;
            margin-top: 16px;
            padding: 13px;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-start:hover {
            opacity: 0.9;
        }

        .btn-start:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Chat area */
        #chat {
            display: none;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .msg {
            display: flex;
            gap: 12px;
            max-width: 780px;
        }

        .msg.user {
            flex-direction: row-reverse;
            align-self: flex-end;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .msg.assistant .avatar {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
        }

        .msg.user .avatar {
            background: #27272a;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 0.9rem;
            line-height: 1.6;
            max-width: 640px;
        }

        .msg.assistant .bubble {
            background: #18181b;
            border: 1px solid #27272a;
            border-top-left-radius: 4px;
        }

        .msg.user .bubble {
            background: #3b1f7a;
            border-top-right-radius: 4px;
        }

        .typing {
            display: none;
            padding: 8px 16px;
        }

        .typing .dots {
            display: flex;
            gap: 4px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #7c3aed;
            animation: bounce 1.2s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0.7);
                opacity: 0.5;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .input-row {
            display: flex;
            gap: 12px;
            padding: 16px 24px;
            border-top: 1px solid #27272a;
            background: #18181b;
        }

        .input-row input {
            flex: 1;
            background: #09090b;
            border: 1px solid #27272a;
            border-radius: 10px;
            padding: 11px 16px;
            color: #e4e4f0;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }

        .input-row input:focus {
            outline: none;
            border-color: #7c3aed;
        }

        .btn-send {
            padding: 11px 20px;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }

        .btn-send:hover {
            opacity: 0.9;
        }

        .btn-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .spinner-inline {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #3f3f46;
            border-top-color: #a78bfa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="topbar">
        <a href="/" class="back-link">← Portfolio</a>
        <div>
            <div class="topbar-title">💬 AI Survey Bot</div>
            <div class="topbar-sub">Powered by Google Gemini</div>
        </div>
    </div>

    <!-- Setup screen -->
    <div id="setup">
        <div class="setup-card">
            <h2>Start a Survey</h2>
            <p>Enter your survey objective and the AI will conduct a natural conversation to gather insights.</p>
            <textarea id="objective"
                placeholder="e.g. Understand customer satisfaction with our mobile app experience"></textarea>
            <button class="btn-start" id="startBtn" onclick="startSurvey()">Start Survey →</button>
        </div>
    </div>

    <!-- Chat screen -->
    <div id="chat">
        <div class="messages" id="messages"></div>
        <div class="typing" id="typing">
            <div class="dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
        <div class="input-row">
            <input type="text" id="userInput" placeholder="Type your response..."
                onkeydown="if(event.key==='Enter') sendMessage()">
            <button class="btn-send" id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        let history = [];

        async function startSurvey() {
            const objective = document.getElementById('objective').value.trim();
            if (!objective) return;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('startBtn').innerHTML = '<span class="spinner-inline"></span>';

            const res = await fetch('/survey/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ objective })
            });
            const data = await res.json();

            document.getElementById('setup').style.display = 'none';
            document.getElementById('chat').style.display = 'flex';

            history = data.history || [];
            addMessage(data.message, 'assistant');
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if (!msg) return;

            input.value = '';
            addMessage(msg, 'user');
            history.push({ role: 'user', content: msg });

            document.getElementById('sendBtn').disabled = true;
            document.getElementById('typing').style.display = 'block';
            scrollBottom();

            const res = await fetch('/survey/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msg, history })
            });
            const data = await res.json();

            document.getElementById('typing').style.display = 'none';
            document.getElementById('sendBtn').disabled = false;

            history = data.history || history;
            addMessage(data.response, 'assistant');
        }

        function addMessage(text, role) {
            const msgs = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.innerHTML = `
                <div class="avatar">${role === 'assistant' ? '🤖' : '👤'}</div>
                <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
            `;
            msgs.appendChild(div);
            scrollBottom();
        }

        function scrollBottom() {
            const msgs = document.getElementById('messages');
            msgs.scrollTop = msgs.scrollHeight;
        }
    </script>
</body>

</html>
